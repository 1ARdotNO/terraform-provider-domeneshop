name: govulncheck
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 5 * * 1"
jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # govulncheck reports standard-library vulnerabilities against the
      # toolchain that runs it, so always use the latest stable Go here
      # rather than the minimum version from go.mod.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          check-latest: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
