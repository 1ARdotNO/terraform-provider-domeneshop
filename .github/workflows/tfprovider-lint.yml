# No path filters: the tfproviderlint check is required by branch protection,
# so it must report a status on every PR or auto-merge would wait forever.
name: Terraform provider lint
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  tfproviderlint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Run tfproviderlint
      run: go run github.com/bflad/tfproviderlint/cmd/tfproviderlint@latest ./...
