# This GitHub action runs your tests for each commit push and/or PR. Optionally
# you can turn it on using a cron schedule for regular testing.
#
# No path filters: these checks are required by branch protection, so they
# must report a status on every PR or auto-merge would wait forever.
name: Tests
on:
  pull_request:
  push:
    branches:
      - main
  # For systems with an upstream API that could drift unexpectedly (like most SaaS systems, etc.),
  # we recommend testing at a regular interval not necessarily tied to code changes. This will
  # ensure you are alerted to something breaking due to an API change, even if the code did not
  # change.
  schedule:
    - cron: "0 13 * * *"
jobs:
  # ensure the code builds...
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Build
        run: |
          go build -v .

  # run acceptance tests in a matrix with Terraform core versions
  test:
    name: Matrix Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - "1.5.7"
          - "1.6.6"
          - "1.9.8"
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
        id: go

      - name: Get dependencies
        run: |
          go mod download

      # The acceptance tests run against an in-process mock of the Domeneshop
      # API that validates all traffic against the vendored OpenAPI document
      # (internal/provider/testdata/openapi.json), so no credentials are
      # needed. To run them against the real API instead, set the
      # DOMENESHOP_TOKEN, DOMENESHOP_SECRET, DOMENESHOP_DOMAIN and
      # DOMENESHOP_DOMAIN_ID environment variables (e.g. from secrets).
      - name: TF acceptance tests
        timeout-minutes: 10
        env:
          TF_ACC: "1"
          TF_ACC_TERRAFORM_VERSION: ${{ matrix.terraform }}
        run: |
          go test -v -cover ./internal/provider/
